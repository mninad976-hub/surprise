<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You 🌹</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@600;700&family=Cinzel:wght@400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      min-height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
    }

    /* Stars background */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    /* Floating hearts */
    .hearts-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow-y: auto;
    }

    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 1.2rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(-110vh) rotate(20deg); }
    }

    /* Main content */
    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
      padding: 40px 24px;
    }

    /* Message 1 */
    .msg1 {
      text-align: center;
      opacity: 0;
      animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.5s;
    }

    .msg1-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.4rem;
      color: #d4b483;
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: block;
    }

    .msg1-text {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 700;
      background: linear-gradient(135deg, #e8737d, #d4b483, #e8737d);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 3s linear infinite 1.5s;
      line-height: 1.1;
    }

    @keyframes shine {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .msg1-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: #c47a82;
      letter-spacing: 0.1rem;
      margin-top: 0.5rem;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.2s;
    }

    .divider-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, #d4b483);
    }

    .divider-line.r {
      background: linear-gradient(to left, transparent, #d4b483);
    }

    /* Message 2 */
    .msg2 {
      text-align: center;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.5s;
      max-width: 500px;
    }

    .msg2-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 300;
      color: #f0e6e8;
      line-height: 1.6;
      font-style: italic;
    }

    .msg2-text span {
      color: #e8737d;
      font-style: normal;
      font-weight: 400;
    }

    .msg2-heart {
      font-size: 2.5rem;
      display: block;
      margin-top: 1rem;
      animation: heartbeat 1.2s ease-in-out infinite 2s;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.3); }
      28% { transform: scale(1); }
      42% { transform: scale(1.2); }
      70% { transform: scale(1); }
    }

    /* Back button */
    .back {
      opacity: 0;
      animation: fadeIn 1s ease forwards 2.5s;
    }

    .back a {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.3rem;
      color: #d4b483;
      text-decoration: none;
      border: 1px solid rgba(212,180,131,0.3);
      padding: 12px 28px;
      transition: all 0.3s ease;
    }

    .back a:hover {
      background: rgba(212,180,131,0.1);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5) rotate(-5deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Floating hearts -->
  <div class="hearts-container" id="hearts"></div>

  <div class="container">

    <!-- Message 1 -->
    <div class="msg1">
      <span class="msg1-label">✦ &nbsp; for you &nbsp; ✦</span>
      <div class="msg1-text">Happy 19 Babe! 🎂</div>
      <div class="msg1-sub">welcome to 19, the world's a little brighter today</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span style="color:#d4b483; font-size:1rem;">🌹</span>
      <div class="divider-line r"></div>
    </div>

    <!-- Message 2 -->
    <div class="msg2">
      <div class="msg2-text">
        I love you <span>soo much</span> —<br>
        more than words, more than songs,<br>
        more than anything I know how to say. 💋
      </div>
      <span class="msg2-heart">♥</span>
    </div>

    <div class="back">
      <a href="index.html">← go back</a>
    </div>

  </div>

  <script>
    // Create stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        top: ${Math.random() * 100}vh;
        left: ${Math.random() * 100}vw;
        animation-duration: ${2 + Math.random() * 4}s;
        animation-delay: ${Math.random() * 5}s;
      `;
      starsEl.appendChild(s);
    }

    // Create floating hearts
    const heartsEl = document.getElementById('hearts');
    const emojis = ['💗', '💕', '🌹', '✨', '💋', '🎀', '💝'];
    for (let i = 0; i < 20; i++) {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.cssText = `
        left: ${Math.random() * 100}vw;
        font-size: ${0.8 + Math.random() * 1}rem;
        animation-duration: ${7 + Math.random() * 8}s;
        animation-delay: ${Math.random() * 10}s;
      `;
      heartsEl.appendChild(h);
    }
  </script>

</body>
</html>
